const fmtCur=(n)=>new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0);
const fmtDate=(iso)=>new Date(iso).toLocaleDateString("fr-FR");
const fmtTime=(iso)=>new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const todayStr=()=>new Date().toISOString().split("T")[0];

// Firebase save/load
async function saveToCloud(data) {
  try {
    if (!window.firebaseReady) return;
    const {doc, setDoc} = window.firebaseFns;
    const db = window.firebaseDb;
    await setDoc(doc(db, "stockpro", "main"), data);
  } catch(e) { console.log("Save error:", e); }
}

async function loadFromCloud() {
  try {
    if (!window.firebaseReady) return null;
    const {doc, getDoc} = window.firebaseFns;
    const db = window.firebaseDb;
    const snap = await getDoc(doc(db, "stockpro", "main"));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.log("Load error:", e); return null; }
}

function subscribeToCloud(callback) {
  try {
    if (!window.firebaseReady) return () => {};
    const {doc, onSnapshot} = window.firebaseFns;
    const db = window.firebaseDb;
    return onSnapshot(doc(db, "stockpro", "main"), (snap) => {
      if (snap.exists()) callback(snap.data());
    });
  } catch(e) { return () => {}; }
}

function App(){
  const [db,setDb]=useState(null);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    const init = async () => {
      // Wait for Firebase
      if (!window.firebaseReady) {
        await new Promise(resolve => window.addEventListener('firebaseReady', resolve, {once:true}));
      }
      // Try cloud first
      const cloudData = await loadFromCloud();
      if (cloudData) {
        setDb(cloudData);
      } else {
        // First time: save seed data to cloud
        const seed = JSON.parse(JSON.stringify(SEED_DATA));
        await saveToCloud(seed);
        setDb(seed);
      }
      // Subscribe to real-time updates
      unsubRef.current = subscribeToCloud((data) => {
        setDb(data);
      });
      setLoading(false);
    };
    init();
    return () => { if(unsubRef.current) unsubRef.current(); };
  },[]);

  const persist = useCallback(async (newDb) => {
    setDb(newDb);
    setSyncing(true);
    await saveToCloud(newDb);
    setSyncing(false);
  },[]);

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0f1e"}}>

  );

  if(!db) return null;
  if(!user) return <Login db={db} onLogin={u=>{setUser(u);setPage("dashboard");}}/>;

  const myStores=user.role==="admin"?db.stores:db.stores.filter(s=>user.storeIds.includes(s.id)||s.id==="central");
  const alertCount=db.products.reduce((a,p)=>{p.variants.forEach(v=>db.stores.forEach(s=>{if((db.stock[s.id]?.[v.id]??0)<=p.lowStockThreshold)a++;}));return a;},0);

  const nav=[
    {id:"dashboard",label:"Tableau de bord",icon:"📊"},
    {id:"sales",label:"Ventes",icon:"🛒"},
    {id:"stock",label:"Stock",icon:"📦"},
    {id:"transfer",label:"Transferts",icon:"🔄"},
    {id:"expenses",label:"Dépenses",icon:"💸"},
    {id:"alerts",label:"Alertes",icon:"⚠️"},
    {id:"history",label:"Historique",icon:"📋"},
    ...(user.role==="admin"?[
      {id:"products",label:"Produits",icon:"🏷️"},
      {id:"users",label:"Utilisateurs",icon:"👥"},
      {id:"stores",label:"Boutiques",icon:"🏪"},
    ]:[]),

  const pages={
    dashboard:<Dashboard db={db} user={user} stores={myStores} setPage={setPage}/>,
    sales:<SalesPage db={db} user={user} stores={myStores} persist={persist}/>,
    stock:<StockPage db={db} user={user} stores={myStores} persist={persist}/>,
    transfer:<TransferPage db={db} user={user} stores={myStores} persist={persist}/>,
    expenses:<ExpensesPage db={db} user={user} stores={myStores} persist={persist}/>,
    alerts:<AlertsPage db={db} stores={myStores}/>,
    history:<HistoryPage db={db}/>,
    products:user.role==="admin"?<ProductsPage db={db} persist={persist}/>:null,
    users:user.role==="admin"?<UsersPage db={db} persist={persist}/>:null,
    stores:user.role==="admin"?<StoresPage db={db} persist={persist}/>:null,
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#0a0f1e"}}>
      <aside style={{width:200,background:"#0f1629",borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,overflowY:"auto",zIndex:10}}>
        <div style={{padding:"16px 14px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid #1e293b"}}>
          <span style={{fontSize:20}}>📦</span>
          <span style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>StockPro</span>
          {syncing && <span style={{fontSize:10,color:"#7c3aed",marginLeft:"auto"}}>⟳</span>}
        </div>
        <nav style={{flex:1,padding:"8px 6px",display:"flex",flexDirection:"column",gap:1}}>
          {nav.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setPage(id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,border:"none",background:page===id?"#1a1040":"transparent",color:page===id?"#a78bfa":"#475569",fontSize:13,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span>{icon}</span><span style={{flex:1}}>{label}</span>
              {id==="alerts"&&alertCount>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{alertCount}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px",borderTop:"1px solid #1e293b",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>{user.name[0]}</div>
          <div style={{flex:1,minWidth:0}}>

          </div>
          <button onClick={()=>setUser(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:"#475569",fontSize:16}}>⏏</button>
        </div>
      </aside>
      <main style={{marginLeft:200,flex:1,minHeight:"100vh"}}>
        {pages[page]}
      </main>
    </div>
  );
}

function Dashboard({db,user,stores,setPage}){
  const t=todayStr();const ids=stores.map(s=>s.id);
  const todaySales=db.sales.filter(s=>s.date.startsWith(t)&&ids.includes(s.storeId));
  const mRev=db.sales.filter(s=>s.date.startsWith(t.slice(0,7))&&ids.includes(s.storeId)).reduce((a,s)=>a+s.total,0);
  const mExp=db.expenses.filter(e=>e.date.startsWith(t.slice(0,7))&&ids.includes(e.storeId)).reduce((a,e)=>a+e.amount,0);
  const alerts=db.products.reduce((a,p)=>{p.variants.forEach(v=>stores.forEach(s=>{if((db.stock[s.id]?.[v.id]??0)<=p.lowStockThreshold)a++;}));return a;},0);
  const stats=[
    {l:"CA aujourd'hui",v:fmtCur(todaySales.reduce((a,s)=>a+s.total,0)),c:"#10b981",i:"💰"},
    {l:"CA ce mois",v:fmtCur(mRev),c:"#6366f1",i:"📈"},
    {l:"Dépenses mois",v:fmtCur(mExp),c:"#f59e0b",i:"💸"},
    {l:"Bénéfice net",v:fmtCur(mRev-mExp),c:mRev-mExp>=0?"#10b981":"#ef4444",i:"🏦"},
    {l:"Alertes stock",v:alerts,c:alerts>0?"#ef4444":"#10b981",i:"⚠️"},
    {l:"Ventes du jour",v:todaySales.length,c:"#7c3aed",i:"🛒"},
  ];
  const recent=[...db.sales].filter(s=>ids.includes(s.storeId)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return (
    <div style={pg}>
      <PH title="Tableau de bord" sub={`Bonjour, ${user.name} 👋`}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:22}}>
        {stats.map((s,i)=>(
          <div key={i} style={{...card,borderLeft:`3px solid ${s.c}`}}>
            <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
            <div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={card}>
          <div style={ctitle}>Dernières ventes</div>
          {recent.length===0?<p style={{color:"#475569",fontSize:13}}>Aucune vente.</p>:recent.map(s=>{
            const st=db.stores.find(x=>x.id===s.storeId);
            return <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1e293b"}}>
              <div><div style={{fontSize:13,color:"#e2e8f0"}}>{st?.name}</div><div style={{fontSize:11,color:"#475569"}}>{fmtDate(s.date)}</div></div>
              <div style={{fontWeight:700,color:"#10b981"}}>{fmtCur(s.total)}</div>
            </div>;
          })}
        </div>
        <div style={card}>
          <div style={ctitle}>Stock par boutique</div>
          {stores.map(s=>{
            let tot=0,low=0;db.products.forEach(p=>p.variants.forEach(v=>{const q=db.stock[s.id]?.[v.id]??0;tot+=q;if(q<=p.lowStockThreshold)low++;}));
            return <div key={s.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:13,color:"#e2e8f0"}}>{s.type==="central"?"🏭":"🏪"} {s.name}</span>
                <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{tot} u.</span>
              </div>
              {low>0&&<div style={{fontSize:11,color:"#f87171"}}>⚠ {low} alerte{low>1?"s":""}</div>}
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

function SalesPage({db,user,stores,persist}){
  const sStores=stores.filter(s=>s.type==="store");
  const [tab,setTab]=useState("new");
  const [sid,setSid]=useState(sStores[0]?.id||"");
  const [items,setItems]=useState([]);
  const [note,setNote]=useState("");
  const [msg,setMsg]=useState({});
  const [sp,setSp]=useState(db.products[0]?.id||"");
  const [sv,setSv]=useState(db.products[0]?.variants[0]?.id||"");
  const [sq,setSq]=useState(1);
  const [spr,setSpr]=useState(db.products[0]?.basePrice||0);
  const [filter,setFilter]=useState({store:"all",date:todayStr()});
  const prod=db.products.find(p=>p.id===sp);
  const total=items.reduce((a,i)=>a+i.qty*i.unitPrice,0);

  const addItem=()=>{
    const avail=db.stock[sid]?.[sv]??0;
    if(sq>avail){setMsg({t:"err",m:`Stock insuffisant (dispo: ${avail})`});return;}
    const p=db.products.find(x=>x.id===sp),v=p?.variants.find(x=>x.id===sv);
    setItems(it=>{const ex=it.find(x=>x.variantId===sv);return ex?it.map(x=>x.variantId===sv?{...x,qty:x.qty+sq}:x):[...it,{productId:sp,variantId:sv,qty:sq,unitPrice:parseFloat(spr),productName:p?.name,variantLabel:v?.label}];});
    setMsg({});
  };

  const confirm=async()=>{
    if(!sid||!items.length)return;
    const n=JSON.parse(JSON.stringify(db));
    for(const it of items){if((n.stock[sid]?.[it.variantId]??0)<it.qty){setMsg({t:"err",m:`Stock insuffisant: ${it.productName}`});return;}}
    items.forEach(it=>{n.stock[sid][it.variantId]-=it.qty;});
    n.sales.unshift({id:`sale_${Date.now()}`,storeId:sid,date:new Date().toISOString(),user:user.name,items,total,note});
    await persist(n);setItems([]);setNote("");setMsg({t:"ok",m:"✅ Vente enregistrée !"});setTimeout(()=>setMsg({}),3000);
  };

  const myIds=stores.map(s=>s.id);
  const filtered=db.sales.filter(s=>{
    if(!myIds.includes(s.storeId))return false;
    if(filter.store!=="all"&&s.storeId!==filter.store)return false;
    if(filter.date&&!s.date.startsWith(filter.date))return false;
    return true;
  });

  return (
    <div style={pg}>
      <PH title="Ventes" sub="Enregistrer et consulter les ventes"/>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["new","➕ Nouvelle vente"],["history","📋 Historique"]].map(([v,l])=>(
          <button key={v} style={{...stab,...(tab===v?stabA:{})}} onClick={()=>setTab(v)}>{l}</button>
        ))}
      </div>
      {tab==="new"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div>
            <div style={card}>
              <div style={ctitle}>Boutique</div>
              <select style={sel} value={sid} onChange={e=>{setSid(e.target.value);setItems([]);}}>
                {sStores.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div style={{...card,marginTop:12}}>
              <div style={ctitle}>Ajouter un article</div>
              <label style={lbl}>Produit</label>
              <select style={sel} value={sp} onChange={e=>{const p=db.products.find(x=>x.id===e.target.value);setSp(e.target.value);setSv(p?.variants[0]?.id||"");setSpr(p?.basePrice||0);}}>
                {db.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <label style={{...lbl,marginTop:10}}>Variante</label>
              <select style={sel} value={sv} onChange={e=>setSv(e.target.value)}>
                {prod?.variants.map(v=><option key={v.id} value={v.id}>{v.label} (stock: {db.stock[sid]?.[v.id]??0})</option>)}
              </select>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
                <div><label style={lbl}>Qté</label><input style={inp} type="number" min="1" value={sq} onChange={e=>setSq(parseInt(e.target.value)||1)}/></div>
                <div><label style={lbl}>Prix (€)</label><input style={inp} type="number" min="0" step="0.01" value={spr} onChange={e=>setSpr(e.target.value)}/></div>
              </div>
              {msg.t==="err"&&<p style={{color:"#f87171",fontSize:13,marginTop:6}}>{msg.m}</p>}
              <button style={{...btn,marginTop:12}} onClick={addItem}>+ Ajouter</button>
            </div>
            <div style={{...card,marginTop:12}}>
              <label style={lbl}>Note</label>
              <input style={inp} placeholder="Commentaire optionnel…" value={note} onChange={e=>setNote(e.target.value)}/>
            </div>
          </div>
          <div style={card}>
            <div style={ctitle}>Panier</div>
            {items.length===0?<p style={{color:"#475569",fontSize:13,padding:"20px 0",textAlign:"center"}}>Aucun article.</p>:items.map((it,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1e293b"}}>

        {edit&&<><button style={{...btn,background:"#059669"}} onClick={save}>✓ Sauvegarder</button><button style={{...btnO,marginLeft:8}} onClick={()=>setEdit(false)}>Annuler</button></>}

          </div>

              </div>

function TransferPage({db,user,stores,persist}){
  const [from,setFrom]=useState("central");const [to,setTo]=useState(stores.find(s=>s.type==="store")?.id||"");
  const [pid,setPid]=useState(db.products[0]?.id||"");const [qtys,setQtys]=useState({});const [msg,setMsg]=useState({});
  const prod=db.products.find(p=>p.id===pid);
  const go=async()=>{
    if(from===to){setMsg({t:"err",m:"Source = destination."});return;}
    const entries=Object.entries(qtys).filter(([,q])=>parseInt(q)>0);
    if(!entries.length){setMsg({t:"err",m:"Aucune quantité."});return;}
    for(const[vid,q]of entries){const a=db.stock[from]?.[vid]??0;if(parseInt(q)>a){setMsg({t:"err",m:`Insuffisant: ${prod.variants.find(v=>v.id===vid)?.label} (dispo:${a})`});return;}}
    const n=JSON.parse(JSON.stringify(db));
    entries.forEach(([vid,q])=>{const qty=parseInt(q);n.stock[from][vid]=(n.stock[from][vid]??0)-qty;if(!n.stock[to])n.stock[to]={};n.stock[to][vid]=(n.stock[to][vid]??0)+qty;});
    const fS=db.stores.find(s=>s.id===from),tS=db.stores.find(s=>s.id===to);
    n.history.unshift({id:Date.now(),type:"transfer",from:fS.name,to:tS.name,product:prod.name,items:entries.map(([vid,q])=>({variant:prod.variants.find(v=>v.id===vid)?.label,qty:parseInt(q)})),date:new Date().toISOString(),user:user.name});
    await persist(n);setQtys({});setMsg({t:"ok",m:"✅ Transfert effectué !"});setTimeout(()=>setMsg({}),3000);
  };
  return (
    <div style={pg}>
      <PH title="Transferts" sub="Déplacer du stock entre emplacements"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div style={card}><label style={lbl}>Source</label><select style={sel} value={from} onChange={e=>setFrom(e.target.value)}>{stores.map(s=><option key={s.id} value={s.id}>{s.type==="central"?"🏭":"🏪"} {s.name}</option>)}</select></div>
        <div style={card}><label style={lbl}>Destination</label><select style={sel} value={to} onChange={e=>setTo(e.target.value)}>{stores.filter(s=>s.id!==from).map(s=><option key={s.id} value={s.id}>{s.type==="central"?"🏭":"🏪"} {s.name}</option>)}</select></div>
      </div>
      <div style={card}>
        <label style={lbl}>Produit</label>
        <select style={sel} value={pid} onChange={e=>{setPid(e.target.value);setQtys({});}}>{db.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
        {prod&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:6,marginTop:12}}>
          {prod.variants.map(v=>{const a=db.stock[from]?.[v.id]??0;return(
            <div key={v.id} style={{background:"#0a0f1e",borderRadius:7,padding:"8px 10px",border:"1px solid #1e293b"}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>{v.label}</div>
              <div style={{fontSize:12,color:"#475569",marginBottom:5}}>Dispo:{a}</div>
              <input style={{width:"100%",background:"#111827",border:"1px solid #334155",borderRadius:5,color:"#e2e8f0",fontSize:14,fontWeight:700,padding:"3px 6px",textAlign:"center"}} type="number" min="0" max={a} placeholder="0" value={qtys[v.id]||""} onChange={e=>setQtys(q=>({...q,[v.id]:e.target.value}))}/>
            </div>
          );})}
        </div>}
      </div>
      {msg.m&&<div style={{...card,marginTop:10,borderColor:msg.t==="ok"?"#059669":"#ef4444"}}><p style={{color:msg.t==="ok"?"#10b981":"#f87171",margin:0}}>{msg.m}</p></div>}
      <button style={{...btn,marginTop:12}} onClick={go}>🔄 Confirmer</button>
    </div>
  );
}

        <div key={p.id} style={{...card,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontWeight:600,color:"#e2e8f0",marginRight:7}}>{p.name}</span><span style={chip}>{p.category}</span><span style={{...chip,color:"#10b981"}}>{fmtCur(p.basePrice)}</span><span style={{...chip,color:"#64748b"}}>seuil:{p.lowStockThreshold}</span></div>
            <button style={{...btnO,borderColor:"#ef4444",color:"#f87171"}} onClick={()=>del(p.id)}>✕ Supprimer</button>
          </div>
          <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap"}}>{p.variants.map(v=><span key={v.id} style={chip}>{v.label}</span>)}</div>
        </div>
      ))}
    </div>
  );
}

function UsersPage({db,persist}){
  const [show,setShow]=useState(false);const [nu,setNu]=useState({name:"",email:"",password:"",role:"staff",storeIds:[]});
  const add=async()=>{if(!nu.name||!nu.email||!nu.password)return;const n=JSON.parse(JSON.stringify(db));n.users.push({id:`u_${Date.now()}`,...nu});await persist(n);setShow(false);setNu({name:"",email:"",password:"",role:"staff",storeIds:[]});};
  const del=async(uid)=>{const n=JSON.parse(JSON.stringify(db));n.users=n.users.filter(u=>u.id!==uid);await persist(n);};
  const rl={admin:"Administrateur",manager:"Gérant",staff:"Personnel"};
  return (
    <div style={pg}>
      <PH title="Utilisateurs" sub={`${db.users.length} utilisateur${db.users.length>1?"s":""}`}><button style={btn} onClick={()=>setShow(!show)}>+ Ajouter</button></PH>
      {show&&<div style={{...card,marginBottom:12,borderColor:"#7c3aed"}}>
        <div style={ctitle}>Nouvel utilisateur</div>
        <input style={inp} placeholder="Nom complet" value={nu.name} onChange={e=>setNu(u=>({...u,name:e.target.value}))}/>
        <input style={{...inp,marginTop:8}} placeholder="Email" value={nu.email} onChange={e=>setNu(u=>({...u,email:e.target.value}))}/>
        <input style={{...inp,marginTop:8}} placeholder="Mot de passe" value={nu.password} onChange={e=>setNu(u=>({...u,password:e.target.value}))}/>
        <select style={{...sel,marginTop:8}} value={nu.role} onChange={e=>setNu(u=>({...u,role:e.target.value}))}><option value="admin">Administrateur</option><option value="manager">Gérant</option><option value="staff">Personnel</option></select>
        {nu.role!=="admin"&&<div style={{marginTop:8}}><label style={lbl}>Boutiques</label>{db.stores.filter(s=>s.type==="store").map(s=><label key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginTop:5,cursor:"pointer"}}><input type="checkbox" checked={nu.storeIds.includes(s.id)} onChange={e=>setNu(u=>({...u,storeIds:e.target.checked?[...u.storeIds,s.id]:u.storeIds.filter(x=>x!==s.id)}))}/><span style={{color:"#e2e8f0",fontSize:13}}>{s.name}</span></label>)}</div>}
        <div style={{display:"flex",gap:8,marginTop:10}}><button style={btn} onClick={add}>Créer</button><button style={btnO} onClick={()=>setShow(false)}>Annuler</button></div>
      </div>}
      {db.users.map(u=>(
        <div key={u.id} style={{...card,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,flexShrink:0}}>{u.name[0]}</div>
              <div><div style={{fontWeight:600,color:"#e2e8f0"}}>{u.name}</div><div style={{fontSize:12,color:"#475569"}}>{u.email}</div><span style={{...chip,background:u.role==="admin"?"#1e1b4b":"#0f172a",color:u.role==="admin"?"#818cf8":"#64748b"}}>{rl[u.role]}</span>{u.storeIds?.map(sid=>{const s=db.stores.find(x=>x.id===sid);return s?<span key={sid} style={chip}>{s.name}</span>:null;})}</div>
            </div>
            <button style={{...btnO,borderColor:"#ef4444",color:"#f87171"}} onClick={()=>del(u.id)}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function StoresPage({db,persist}){
  const [show,setShow]=useState(false);const [name,setName]=useState("");
  const add=async()=>{if(!name.trim())return;const n=JSON.parse(JSON.stringify(db));const id=`s_${Date.now()}`;n.stores.push({id,name,type:"store"});n.stock[id]={};await persist(n);setShow(false);setName("");};
  const del=async(sid)=>{if(sid==="central")return;const n=JSON.parse(JSON.stringify(db));n.stores=n.stores.filter(s=>s.id!==sid);delete n.stock[sid];await persist(n);};
  return (
    <div style={pg}>
      <PH title="Boutiques" sub={`${db.stores.length} emplacement${db.stores.length>1?"s":""}`}><button style={btn} onClick={()=>setShow(!show)}>+ Ajouter</button></PH>
      {show&&<div style={{...card,marginBottom:12,borderColor:"#7c3aed"}}><input style={inp} placeholder="Nom de la boutique" value={name} onChange={e=>setName(e.target.value)}/><div style={{display:"flex",gap:8,marginTop:8}}><button style={btn} onClick={add}>Créer</button><button style={btnO} onClick={()=>setShow(false)}>Annuler</button></div></div>}
      {db.stores.map(s=>{
        let tot=0;db.products.forEach(p=>p.variants.forEach(v=>{tot+=db.stock[s.id]?.[v.id]??0;}));
        const rev=db.sales.filter(x=>x.storeId===s.id).reduce((a,x)=>a+x.total,0);
        return <div key={s.id} style={{...card,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontSize:18,marginRight:7}}>{s.type==="central"?"🏭":"🏪"}</span><span style={{fontWeight:600,color:"#e2e8f0",marginRight:7}}>{s.name}</span><span style={chip}>{s.type==="central"?"Entrepôt":"Boutique"}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{textAlign:"right"}}><div style={{fontSize:13,color:"#64748b"}}>Stock: <span style={{fontWeight:700,color:"#e2e8f0"}}>{tot}</span></div><div style={{fontSize:13,color:"#64748b"}}>CA: <span style={{fontWeight:700,color:"#10b981"}}>{fmtCur(rev)}</span></div></div>
              {s.id!=="central"&&<button style={{...btnO,borderColor:"#ef4444",color:"#f87171"}} onClick={()=>del(s.id)}>✕</button>}
            </div>
          </div>
        </div>;
      })}
    </div>
  );
}

function PH({title,sub,children}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
    <div><h2 style={{color:"#e2e8f0",fontSize:20,fontWeight:800,margin:0}}>{title}</h2><p style={{color:"#475569",fontSize:13,margin:"3px 0 0"}}>{sub}</p></div>
    {children&&<div style={{display:"flex",gap:8,alignItems:"center"}}>{children}</div>}
  </div>;
}

const pg={padding:"22px 22px 48px"};
const card={background:"#111827",border:"1px solid #1e293b",borderRadius:10,padding:"13px 16px"};
const ctitle={color:"#475569",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12};
const chip={display:"inline-block",background:"#0f172a",color:"#64748b",borderRadius:5,padding:"2px 7px",fontSize:11,marginRight:4};
const stab={padding:"6px 12px",borderRadius:7,border:"1px solid #1e293b",background:"transparent",color:"#475569",fontSize:13,cursor:"pointer"};
const stabA={background:"#1a1040",borderColor:"#4f46e5",color:"#a78bfa"};
const btn={display:"inline-flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:7,border:"none",background:"#7c3aed",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"};
const btnO={display:"inline-flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:7,border:"1px solid #1e293b",background:"transparent",color:"#64748b",fontSize:13,cursor:"pointer"};
const inp={width:"100%",background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:7,color:"#e2e8f0",fontSize:13,padding:"8px 11px",boxSizing:"border-box"};
const sel={width:"100%",background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:7,color:"#e2e8f0",fontSize:13,padding:"8px 11px"};
const lbl={display:"block",color:"#475569",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
